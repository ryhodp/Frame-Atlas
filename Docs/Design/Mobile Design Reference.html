<script>
        // Simple micro-interaction for long-press simulation on mobile cards
        const items = document.querySelectorAll('.image-hover');
        items.forEach(item => {
            let pressTimer;
            
            item.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    item.querySelector('.material-symbols-outlined').style.transform = 'scale(1.2)';
                }, 500);
            });
            
            item.addEventListener('touchend', () => {
                clearTimeout(pressTimer);
            });
        });

        // Hide navigation on scroll down for better immersive feel
        let lastScrollTop = 0;
        const nav = document.querySelector('nav');
        const header = document.querySelector('header');
        
        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 100) {
                nav.style.transform = 'translateY(100%)';
                header.style.transform = 'translateY(-100%)';
            } else {
                nav.style.transform = 'translateY(0)';
                header.style.transform = 'translateY(0)';
            }
            nav.style.transition = 'transform 0.3s ease-out';
            header.style.transition = 'transform 0.3s ease-out';
            lastScrollTop = scrollTop;
        });
    </script>
